version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: scalable-api-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: scalable-api
    volumes:
      - mongodb_data:/data/db
    networks:
      - scalable-network

  redis:
    image: redis:7.2-alpine
    container_name: scalable-api-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scalable-network
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data:

networks:
  scalable-network:
    driver: bridge

